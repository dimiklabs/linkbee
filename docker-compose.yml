services:

  # ─── TimescaleDB (PostgreSQL 17 + time-series extension) ─────────────────
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: linkbee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkbee
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d linkbee"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Valkey (Redis-compatible cache) ──────────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    container_name: linkbee-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mailpit (SMTP catch-all for development) ─────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: linkbee-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit_data:/data

  # ─── Backend (Go API) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linkbee-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST_WRITE: postgres
      DB_HOST_READ: postgres
      VALKEY_HOST: valkey
      SMTP_HOST: mailpit
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Frontend (Vite dev server) ───────────────────────────────────────────
  frontend:
    image: node:22-alpine
    container_name: linkbee-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
      VITE_APP_NAME: Shortlink
      VITE_BASE_DOMAIN: http://localhost:8080
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend

  # ─── Nginx (reverse proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: linkbee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  valkey_data:
  mailpit_data:
  frontend_node_modules:
